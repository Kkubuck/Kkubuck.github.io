research_projects:
  - title: Deep Learning Research for X-ray Diagnosis of Neonatal Respiratory Distress Syndrome (RDS)
    organization: Chungnam National University Hospital
    period: Jan. 2023 - Jul. 2023
    bullets:
      - Segmented X-ray images to isolate lung regions.
      - Improved diagnostic performance through classification network training.
      - Used Grad-CAM for analysis.
  - title: Research on SAR Image Analysis and Semantic Segmentation
    organization: Capstone Design
    period: Jan. 2024 - Dec. 2024
    bullets:
      - Explored SAR image preprocessing techniques.
      - Investigated despeckling and scaling methods for SAR data.
      - Devised generative models and data augmentation for training data acquisition.
      - Improved SAR segmentation performance through knowledge distillation.
  - title: Open-Vocabulary Zero-Shot Detection for Military Objects
    organization: Collaborative Research with DataMaker
    period: Jan. 2025 - Oct. 2025
    bullets:
      - Conducted collaborative research on open-vocabulary zero-shot detection for military objects.
      - Studied recognition and detection strategies for unseen military targets.
      - Built and analyzed experimental pipelines for robust zero-shot understanding.
      - Investigated vision-language approaches for military AI applications.

