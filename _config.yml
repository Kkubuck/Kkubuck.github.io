# Site Settings
baseurl: ""
url: "https://kkubuck.github.io"

# Features Setting
publications: False
presentations: False
blog: True

# Language of the website
lang: ko

# Search engine optimization settings
title: Kkubuck Papers
tagline: 논문을 한국어로 정리하는 개인 연구 노트
description: 컴퓨터비전과 멀티모달 논문을 한국어로 리뷰하고 핵심 그림과 실험 결과를 함께 정리하는 개인 연구 블로그입니다.
author: Kkubuck
twitter:
  username: Kkubuck
  card: summary
logo: /assets/img/kkubuck-avatar.svg
social:
  name: Kkubuck
  links:
    - https://github.com/Kkubuck
locale: ko_KR

# Page Settings
theme_settings:
  title: Kkubuck Papers
  home_title: 연구 블로그
  papers_title: 논문 리뷰
  blog_title: 전체 블로그
  tags_title: 태그
  recentpubs_title: RECENT PAPERS

# Pagination
paginate: 5
paginate_path: "blog/page:num"

# Build Settings
sass:
  sass_dir: _sass
  style: :compressed
plugins: ['jekyll-paginate', 'jekyll/scholar', 'jekyll-seo-tag']
bootstrap:
  assets: true

exclude:
  - .venv
  - .pytest_cache
  - .mypy_cache
  - .ruff_cache
  - downloads
  - UNKNOWN.egg-info
  - README.md
  - site

# Bibliography settings
scholar:
  bibliography: publications.bib
  bibliography_template: pubstemplate
  style: apa
  locale: en
  last_name: Me
  first_name: [Myself, M.]
  sort_by: year,month
  order: descending,ascending

filtered_bibtex_keywords: [abbr, abstract, arxiv, bibtex_show, html, pdf, selected, supp, blog, code, poster, slides, website]

academicons:
  version: "1.9.1"
  integrity: "sha256-i1+4qU2G2860dGGIOJscdC30s9beBXjFfzjWLjBRsBg="
fontawesome:
  version: "5.15.4"
  integrity: "sha256-mUZM63G8m73Mcidfrv5E+Y61y7a12O5mW4ezU3bxqW4="
jquery:
  version: "3.6.0"
  integrity: "sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4="
