# Site identity
url: "https://kkubuck.github.io"
baseurl: ""
lang: ko
timezone: Asia/Seoul

title: Kkubuck Blog
tagline: Paper reviews, experiment notes, and computer vision research logs
description: A personal archive for computer vision paper reviews and research/build notes.
author: Kkubuck
locale: ko_KR
logo: /assets/img/og-card.png

social:
  name: Kkubuck
  links:
    - https://github.com/Kkubuck

twitter:
  username: Kkubuck
  card: summary_large_image

publications: false
presentations: false
blog: true

theme_settings:
  title: Kkubuck
  home_title: Home
  papers_title: Papers
  blog_title: Blog
  tags_title: Tags
  projects_title: Projects
  recentpubs_title: Recent

markdown: kramdown
highlighter: rouge
future: true
strict_front_matter: true

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll/scholar
  - jekyll-seo-tag

exclude:
  - .venv
  - .pytest_cache
  - .mypy_cache
  - .ruff_cache
  - downloads
  - UNKNOWN.egg-info
  - README.md
  - DESIGN_PROMPT.md
  - node_modules
  - vendor
  - site

include:
  - site.webmanifest

scholar:
  bibliography: publications.bib
  bibliography_template: pubstemplate
  style: apa
  locale: en
  last_name: Lee
  first_name: [Jisang, J.]
  sort_by: year,month
  order: descending,ascending

filtered_bibtex_keywords: [abbr, abstract, arxiv, bibtex_show, html, pdf, selected, supp, blog, code, poster, slides, website]
