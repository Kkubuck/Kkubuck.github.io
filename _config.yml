# Site Settings
baseurl: ""
url: "https://kkubuck.github.io"

# Features Setting
# Turn subpages on or off
publications: False
presentations: False
blog: True

# Language of the website
lang: ko

# Search engine optimization settings
title: Kkubuck Papers
tagline: 논문을 한국어 블로그로 정리하는 개인 연구 노트
description: 논문 PDF와 arXiv 자료를 추출, 요약, 검수해서 Jekyll 블로그로 자동 정리하는 개인 페이지입니다.
author: Kkubuck
twitter:
  username: Kkubuck
  card: summary
logo: /assets/img/kkubuck-avatar.svg
social:
  name: Kkubuck
  links:
    - https://github.com/Kkubuck
locale: ko_KR

# Page Settings
theme_settings:
  title: Kkubuck Papers
  home_title: 논문 요약 블로그
  papers_title: 논문 포스트
  blog_title: 전체 블로그
  tags_title: 태그
  workflow_title: 자동화 흐름
  featured_title: 상단 시각자료 규칙
  recentpubs_title: RECENT PAPERS

# Pagination
paginate: 5
paginate_path: "blog/page:num"

# Build Settings
sass:
  sass_dir: _sass
  style: :compressed
plugins: ['jekyll-paginate', 'jekyll/scholar', 'jekyll-seo-tag']
bootstrap:
  assets: true

exclude:
  - .venv
  - .pytest_cache
  - .mypy_cache
  - .ruff_cache
  - downloads
  - paper_blog
  - paper_blog.egg-info
  - UNKNOWN.egg-info
  - skills
  - scripts
  - tests
  - pyproject.toml
  - setup.py
  - README.md
  - site

# Bibliography settings
scholar:
  bibliography: publications.bib
  bibliography_template: pubstemplate
  style: apa
  locale: en
  last_name: Me
  first_name: [Myself, M.]
  sort_by: year,month
  order: descending,ascending

filtered_bibtex_keywords: [abbr, abstract, arxiv, bibtex_show, html, pdf, selected, supp, blog, code, poster, slides, website] # Filter out certain bibtex entry keywords used internally from the bib output

academicons:
  version: "1.9.1"
  integrity: "sha256-i1+4qU2G2860dGGIOJscdC30s9beBXjFfzjWLjBRsBg="
fontawesome:
  version: "5.15.4"
  integrity: "sha256-mUZM63G8m73Mcidfrv5E+Y61y7a12O5mW4ezU3bxqW4="
jquery:
  version: "3.6.0"
  integrity: "sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4="
