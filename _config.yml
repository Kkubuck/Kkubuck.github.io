# Site identity
url: "https://kkubuck.github.io"
baseurl: ""
lang: ko
timezone: Asia/Seoul

title: Kkubuck 연구 노트
tagline: 논문 리뷰, 실험 기록, 컴퓨터 비전 연구 아카이브
description: 컴퓨터 비전 논문 리뷰와 연구·개발 기록을 정리하는 개인 아카이브입니다.
author: Kkubuck
locale: ko_KR
logo: /assets/img/og-card.png

social:
  name: Kkubuck
  links:
    - https://github.com/Kkubuck

twitter:
  username: Kkubuck
  card: summary_large_image

publications: false
presentations: false
blog: true

theme_settings:
  title: Kkubuck
  home_title: 홈
  papers_title: 논문 리뷰
  blog_title: 연구 노트
  tags_title: 태그
  projects_title: 프로젝트
  recentpubs_title: 최근 글

markdown: kramdown
highlighter: rouge
future: true
strict_front_matter: true

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll/scholar
  - jekyll-seo-tag

exclude:
  - .venv
  - .pytest_cache
  - .mypy_cache
  - .ruff_cache
  - downloads
  - UNKNOWN.egg-info
  - README.md
  - DESIGN_PROMPT.md
  - node_modules
  - vendor
  - site

include:
  - site.webmanifest

scholar:
  bibliography: publications.bib
  bibliography_template: pubstemplate
  style: apa
  locale: en
  last_name: Lee
  first_name: [Jisang, J.]
  sort_by: year,month
  order: descending,ascending

filtered_bibtex_keywords: [abbr, abstract, arxiv, bibtex_show, html, pdf, selected, supp, blog, code, poster, slides, website]
