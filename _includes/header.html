{% assign current_url = page.url | default: '/' %}
<header class="site-header" data-site-header>
  <div class="site-header__inner glass-surface">
    <a class="site-brand" href="{{ '/' | relative_url }}" aria-label="Kkubuck 연구 노트 홈">
      <span class="site-brand__mark" aria-hidden="true"><i></i><i></i><b></b></span>
      <span class="site-brand__text"><strong>Kkubuck</strong><small>연구 아카이브</small></span>
    </a>

    <nav class="desktop-nav" aria-label="주 메뉴">
      <a href="{{ '/' | relative_url }}"{% if current_url == '/' %} class="is-current" aria-current="page"{% endif %}>홈</a>
      <a href="{{ '/papers/' | relative_url }}"{% if current_url contains '/papers/' %} class="is-current" aria-current="page"{% endif %}>논문 리뷰</a>
      <a href="{{ '/blog/' | relative_url }}"{% if current_url contains '/blog/' %} class="is-current" aria-current="page"{% endif %}>연구 노트</a>
      <a href="{{ '/projects/' | relative_url }}"{% if current_url contains '/projects/' or current_url contains '/subprojects/' %} class="is-current" aria-current="page"{% endif %}>프로젝트</a>
      <a href="{{ '/tags/' | relative_url }}"{% if current_url contains '/tags/' %} class="is-current" aria-current="page"{% endif %}>태그</a>
      <a href="{{ '/cv/' | relative_url }}"{% if current_url contains '/cv/' %} class="is-current" aria-current="page"{% endif %}>이력</a>
    </nav>

    <div class="site-header__actions">
      <button class="header-search" type="button" data-command-open aria-label="검색 열기">
        <svg class="icon" aria-hidden="true"><use href="{{ '/assets/icons.svg' | relative_url }}#search"></use></svg>
        <span>검색</span><kbd>⌘K</kbd>
      </button>
      <button class="icon-button" type="button" data-theme-toggle aria-label="색상 모드 전환" aria-pressed="false">
        <svg class="icon theme-icon theme-icon--moon" aria-hidden="true"><use href="{{ '/assets/icons.svg' | relative_url }}#moon"></use></svg>
        <svg class="icon theme-icon theme-icon--sun" aria-hidden="true"><use href="{{ '/assets/icons.svg' | relative_url }}#sun"></use></svg>
      </button>
      <button class="mobile-menu-button" type="button" data-mobile-menu-open aria-label="메뉴 열기" aria-controls="mobile-navigation" aria-expanded="false">
        <span></span><span></span>
      </button>
    </div>
  </div>

  <div class="mobile-menu" id="mobile-navigation" data-mobile-menu aria-hidden="true">
    <button class="mobile-menu__backdrop" type="button" data-mobile-menu-close tabindex="-1" aria-label="메뉴 닫기"></button>
    <div class="mobile-menu__panel glass-surface" role="dialog" aria-modal="true" aria-label="사이트 메뉴">
      <div class="mobile-menu__head">
        <span><strong>Kkubuck</strong><small>연구 아카이브</small></span>
        <button class="icon-button" type="button" data-mobile-menu-close aria-label="메뉴 닫기"><svg class="icon" aria-hidden="true"><use href="{{ '/assets/icons.svg' | relative_url }}#close"></use></svg></button>
      </div>
      <nav aria-label="모바일 주 메뉴">
        <a href="{{ '/' | relative_url }}"><span>01</span><strong>홈</strong><small>아카이브 시작</small></a>
        <a href="{{ '/papers/' | relative_url }}"><span>02</span><strong>논문 리뷰</strong><small>논문별 핵심 정리</small></a>
        <a href="{{ '/blog/' | relative_url }}"><span>03</span><strong>연구 노트</strong><small>실험과 개발 기록</small></a>
        <a href="{{ '/projects/' | relative_url }}"><span>04</span><strong>프로젝트</strong><small>구현 사례와 도구</small></a>
        <a href="{{ '/tags/' | relative_url }}"><span>05</span><strong>태그</strong><small>주제별 탐색</small></a>
        <a href="{{ '/cv/' | relative_url }}"><span>06</span><strong>이력</strong><small>연구 및 학술 활동</small></a>
        <a href="{{ '/about/' | relative_url }}"><span>07</span><strong>소개</strong><small>아카이브 안내</small></a>
      </nav>
      <a class="mobile-menu__github" href="{{ site.data.profile.webpage }}" target="_blank" rel="noreferrer"><svg class="icon" aria-hidden="true"><use href="{{ '/assets/icons.svg' | relative_url }}#github"></use></svg><span>GitHub</span><svg class="icon" aria-hidden="true"><use href="{{ '/assets/icons.svg' | relative_url }}#external"></use></svg></a>
    </div>
  </div>
</header>
